<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>HON DATA FORMAT Mobile</title>
    <link rel="stylesheet" href="styles.css?v=20260515-38" />
  </head>
  <body class="mobile-page">
    <main class="mobile-shell">
      <header class="mobile-header">
        <div class="brand compact-brand">
          <div class="scanner-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">HON DATA FORMAT</p>
            <h1>データフォーマットの依頼内容を入力してください。</h1>
          </div>
        </div>
        <button class="icon-button" id="clearButton" type="button" aria-label="会話をクリア" title="会話をクリア">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v5" />
            <path d="M14 11v5" />
          </svg>
        </button>
      </header>

      <form class="composer mobile-composer" id="chatForm">
        <label class="sr-only" for="messageInput">質問</label>
        <input
          id="messageInput"
          autocomplete="off"
          autofocus
          inputmode="text"
          placeholder="質問を入力"
        />
        <button class="send-button" type="submit" aria-label="送信" title="送信">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 2L11 13" />
            <path d="M22 2l-7 20-4-9-9-4 20-7z" />
          </svg>
        </button>
      </form>

      <section class="chat-area mobile-chat" aria-label="回答結果">
        <div class="messages" id="messages" role="log" aria-live="polite"></div>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="app.js?v=20260515-38"></script>
  </body>
</html>
