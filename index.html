<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HON DATA FORMAT</title>
    <link rel="stylesheet" href="styles.css?v=20260520-23" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="設定カテゴリ">
        <div class="brand">
          <div class="scanner-mark" aria-hidden="true">
            <span></span>
          </div>
          <div>
            <p class="eyebrow">HON DATA FORMAT</p>
            <h1>データフォーマット案内</h1>
          </div>
        </div>

        <button class="sample-prompt" type="button" data-sample-prompt="QR10桁読み取り時、3桁目から5桁出力設定">
          <span>サンプル例① データ抽出</span>
          <strong>QR10桁読み取り時、3桁目から5桁出力設定</strong>
        </button>
        <button class="sample-prompt" type="button" data-sample-prompt="NW-7読み取り時、先頭にABCの文字列入力設定">
          <span>サンプル例② キャラクタ挿入</span>
          <strong>NW-7読み取り時、先頭にABCの文字列入力設定</strong>
        </button>
        <button class="sample-prompt" type="button" data-sample-prompt="GS1-128読み取り時、GSキャラクタを#に置き換えて出力設定">
          <span>サンプル例③ キャラクタ置換</span>
          <strong>GS1-128読み取り時、GSキャラクタを#に置き換えて出力設定</strong>
        </button>
        <button class="sample-prompt" type="button" data-sample-prompt="Code128読み取り時、データ末尾にCTRL+ALT+F5のキー入力設定">
          <span>サンプル例⓸ キーストローク挿入</span>
          <strong>Code128読み取り時、データ末尾にCTRL+ALT+F5のキー入力設定</strong>
        </button>
        <button class="sample-prompt" type="button" data-sample-prompt="設定クリアして、OCR10桁読み取り時、ハイフン削除して出力設定とCode128読み取り時、スペースを#に置き換えて出力設定">
          <span>サンプル例⑤ 複数コード種設定</span>
          <strong>設定クリアして、OCR10桁読み取り時、ハイフン削除して出力設定とCode128読み取り時、スペースを#に置き換えて出力設定</strong>
        </button>

        <section class="panel">
          <div class="quick-actions" id="quickActions"></div>
        </section>

      </aside>

      <section class="chat-area" aria-label="チャット">
        <header class="chat-header">
          <div>
            <p class="eyebrow">HON DATA FORMAT</p>
            <h2>データフォーマットの依頼内容を入力してください。</h2>
          </div>
          <button class="icon-button" id="clearButton" type="button" aria-label="会話をクリア" title="会話をクリア">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v5" />
              <path d="M14 11v5" />
            </svg>
          </button>
          <a class="mobile-link" href="mobile.html">スマートフォン表示</a>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">質問</label>
          <input
            id="messageInput"
            autocomplete="off"
            placeholder="質問を入力"
          />
          <button class="send-button" type="submit" aria-label="送信" title="送信">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2L11 13" />
              <path d="M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="app.js?v=20260520-23"></script>
  </body>
</html>
