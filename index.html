<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HON DATA FORMAT</title>
    <link rel="stylesheet" href="styles.css?v=20260601-03" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="設定カテゴリ">
        <div class="sidebar-content">
          <div class="brand">
            <div class="scanner-mark" aria-hidden="true">
              <span></span>
            </div>
            <div>
              <p class="eyebrow">HON DATA FORMAT</p>
              <h1>データフォーマット案内</h1>
            </div>
          </div>

          <section class="sequence-builder" id="dataFormatSettingsBuilder" aria-label="データフォーマットオプション設定">
            <div class="sequence-builder-header">
              <div>
                <p class="eyebrow">DATA FORMAT</p>
                <h3>データフォーマットオプション設定</h3>
              </div>
              <button class="sequence-toggle" id="dataFormatSettingsToggle" type="button" aria-expanded="false" aria-controls="dataFormatSettingsBody">
                開く
              </button>
            </div>
            <div class="sequence-builder-body" id="dataFormatSettingsBody" hidden>
              <div class="sequence-mode-row">
                <label>
                  データフォーマット初期設定
                  <select id="dataFormatDefaultMode">
                    <option value="off">付加しない</option>
                    <option value="on">付加する</option>
                  </select>
                </label>
                <label>
                  データフォーマットモード設定
                  <select id="dataFormatterMode">
                    <option value="DFM_EN1">DF要求なし、Pre/Sufあり</option>
                    <option value="DFM_EN2">DF要求あり、Pre/Sufあり</option>
                    <option value="DFM_EN3">DF要求なし、Pre/Sufなし</option>
                    <option value="DFM_EN4">DF要求あり、Pre/Sufなし</option>
                  </select>
                </label>
                <label>
                  不一致エラー音設定
                  <select id="dataFormatErrorTone">
                    <option value="DFMDEC0">エラー音あり</option>
                    <option value="DFMDEC1">エラー音なし</option>
                  </select>
                </label>
              </div>
              <div class="sequence-actions">
                <button type="button" id="resetDataFormatSettings">初期値</button>
              </div>
            </div>
          </section>

          <section class="sequence-builder" id="outputSequenceBuilder" aria-label="アウトプットシーケンス設定">
            <div class="sequence-builder-header">
              <div>
                <p class="eyebrow">OUTPUT SEQUENCE</p>
                <h3>アウトプットシーケンス設定</h3>
              </div>
              <button class="sequence-toggle" id="sequenceToggle" type="button" aria-expanded="false" aria-controls="sequenceBuilderBody">
                開く
              </button>
            </div>
            <div class="sequence-builder-body" id="sequenceBuilderBody" hidden>
              <div class="sequence-mode-row">
                <label class="sequence-switch data-format-append-switch">
                  <input id="appendSequenceToDataFormat" type="checkbox" />
                  <span>データフォーマット生成時に追加</span>
                </label>
              </div>
              <div class="sequence-mode-row">
                <label>
                  アウトプットシーケンスモード設定
                  <select id="sequenceMode">
                    <option value="0">無効</option>
                    <option value="1">有効、要求しない</option>
                    <option value="2">有効、要求する</option>
                  </select>
                </label>
              </div>
              <div class="sequence-items" id="sequenceItems"></div>
              <div class="sequence-actions">
                <button type="button" id="clearSequenceItems">クリア</button>
                <button type="button" id="addSequenceItem">バー追加</button>
                <button type="button" id="generateSequenceCommand">生成</button>
              </div>
            </div>
          </section>

          <section class="sequence-builder" id="symbolSettingsBuilder" aria-label="シンボル設定">
            <div class="sequence-builder-header">
              <div>
                <p class="eyebrow">SYMBOL</p>
                <h3>シンボル設定</h3>
              </div>
              <button class="sequence-toggle" id="symbolSettingsToggle" type="button" aria-expanded="false" aria-controls="symbolSettingsBody">
                開く
              </button>
            </div>
            <div class="sequence-builder-body" id="symbolSettingsBody" hidden>
              <div class="sequence-mode-row">
                <label class="sequence-switch symbol-append-switch">
                  <input id="appendSymbolsToDataFormat" type="checkbox" />
                  <span>データフォーマット生成時に追加</span>
                </label>
              </div>
              <div class="symbol-settings-header">
                <span>シンボル種</span>
                <span class="symbol-enable-header">
                  <label class="symbol-disable-all">
                    <input id="disableAllSymbols" type="checkbox" />
                    <span>全無効</span>
                  </label>
                  有効/無効
                </span>
                <span aria-hidden="true"></span>
                <span aria-hidden="true"></span>
              </div>
              <div class="symbol-settings-list" id="symbolSettingsRows"></div>
              <div class="sequence-actions">
                <button type="button" id="generateSymbolDefaultCommand">初期値バー</button>
                <button type="button" id="resetSymbolSettings">初期値</button>
                <button type="button" id="generateSymbolSettings">生成</button>
              </div>
            </div>
          </section>

          <button class="sample-prompt" type="button" data-sample-prompt="QRの10桁読み取り時、3桁目から5桁出力設定">
            <span>データフォーマットサンプル例① データ抽出</span>
            <strong>QRの10桁読み取り時、3桁目から5桁出力設定</strong>
          </button>
          <button class="sample-prompt" type="button" data-sample-prompt="NW-7読み取り時、先頭にABCの文字列挿入設定">
            <span>データフォーマットサンプル例② キャラクタ挿入</span>
            <strong>NW-7読み取り時、先頭にABCの文字列挿入設定</strong>
          </button>
          <button class="sample-prompt" type="button" data-sample-prompt="GS1-128読み取り時、GSキャラクタを#に置換出力設定">
            <span>データフォーマットサンプル例③ キャラクタ置換</span>
            <strong>GS1-128読み取り時、GSキャラクタを#に置換出力設定</strong>
          </button>
          <button class="sample-prompt" type="button" data-sample-prompt="Code128読み取り時、データ末尾にCTRL+ALT+F5のキー挿入設定">
            <span>データフォーマットサンプル例⓸ キーストローク挿入</span>
            <strong>Code128読み取り時、データ末尾にCTRL+ALT+F5のキー挿入設定</strong>
          </button>
          <button class="sample-prompt" type="button" data-sample-prompt="OCRの10桁読み取り時、ハイフン削除設定とCode128読み取り時、スペースを#に置換出力設定">
            <span>データフォーマットサンプル例⑤ 複数コード種設定</span>
            <strong>OCRの10桁読み取り時、ハイフン削除設定とCode128読み取り時、スペースを#に置換出力設定</strong>
          </button>

          <section class="panel">
            <div class="quick-actions" id="quickActions"></div>
          </section>
        </div>

      </aside>

      <section class="chat-area" aria-label="チャット">
        <header class="chat-header">
          <div>
            <p class="eyebrow">HON DATA FORMAT</p>
            <h2>データフォーマットの依頼内容を入力してください。</h2>
          </div>
          <button class="icon-button" id="clearButton" type="button" aria-label="会話をクリア" title="会話をクリア">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v5" />
              <path d="M14 11v5" />
            </svg>
          </button>
          <a class="mobile-link" href="mobile.html">スマートフォン表示</a>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="sr-only" for="messageInput">質問</label>
          <input
            id="messageInput"
            autocomplete="off"
            placeholder="質問を入力"
          />
          <button class="send-button" type="submit" aria-label="送信" title="送信">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M22 2L11 13" />
              <path d="M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <div class="avatar"></div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="app.js?v=20260609-03"></script>
  </body>
</html>
